# ============================================================
# Stellar 主题配置（Gray2 技术笔记）
# 极简白色阅读风格 · 品牌色 #2d6cdf
# 文档：https://xaoxuu.com/wiki/stellar/
# ============================================================

######## head tags ########
open_graph:
  enable: true
  twitter_id:

######## Sidebar ########
logo:
  avatar: '[/img/avatar.png](/about/)'
  title: '[{config.title}](/)'
  subtitle: '工程 · 技术 · 生活'

# 侧边栏主功能导航菜单
menubar:
  columns: 4
  items:
    - id: post
      theme: '#2d6cdf'
      icon: solar:documents-bold-duotone
      title: 博客
      url: /
    - id: wiki
      theme: '#3DC550'
      icon: solar:notebook-bookmark-bold-duotone
      title: 专栏
      url: /categories/
    - id: explore
      theme: '#FA6400'
      icon: solar:archive-bold-duotone
      title: 归档
      url: /archives/
    - id: social
      theme: '#F44336'
      icon: solar:user-bold-duotone
      title: 关于
      url: /about/

######## Main ########
site_tree:
  home:
    leftbar: welcome, recent
    rightbar:
  index_blog:
    menu_id: post
    leftbar: welcome, recent
    rightbar:
  post:
    menu_id: post
    leftbar: related, recent
    rightbar: ghrepo, toc
  page:
    leftbar: recent
    rightbar: toc
  error_page:
    menu_id: post
    '404': '/404.html'
    leftbar: recent, timeline
    rightbar: timeline

######## Article ########
article:
  type: tech
  cover_ratio: 2
  banner_ratio: 2.5
  auto_banner: false
  auto_excerpt: 160
  category_color:
    '新能源': '#2d6cdf'
    '工业工程': '#FA6400'
    '化工工程': '#2d6cdf'
    '数据科学': '#7C3AED'
  license: '本文采用 [署名-非商业性使用-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议，转载请注明出处。'
  share:
  related_posts:
    enable: false
    max_count: 5

search:
  service: local_search
  local_search:
    field: all
    path: /search.json
    content: true

######## Comments ########
comments:
  service:

######## Footer ########
footer:
  social:
    github:
      icon: '<img src="https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/social/08a41b181ce68.svg"/>'
      url: https://github.com/Gray2
  sitemap:
    - title: 博客
      items:
        - '[近期发布](/)'
        - '[分类](/categories/)'
        - '[标签](/tags/)'
        - '[归档](/archives/)'
    - title: 关于
      items:
        - '[关于我](/about/)'
        - '[RSS](/atom.xml)'
  content: |
    本站由 [{author.name}](/) 使用 [{theme.name} {theme.version}]({theme.tree}) 主题创建。
    记录 · 思考 · 成长

######## Tag Plugins ########
tag_plugins:
  note:
    default_color: ''
    border: true
  checkbox:
    interactive: false
  copy:
    toast: 复制成功
  image:
    fancybox: true

######## Plugins ########
plugins:
  preload:
    enable: true
    service: flying_pages
    flying_pages: https://gcore.jsdelivr.net/npm/flying-pages@2/flying-pages.min.js
  fancybox:
    enable: true
    loader: /js/plugins/fancybox-loader.js
    js: https://gcore.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js
    css: https://gcore.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css
    selector: .md-text img:not([class]), .md-text .image img
  swiper:
    enable: true
    css: https://unpkg.com/swiper@10.3/swiper-bundle.min.css
    js: https://unpkg.com/swiper@10.3/swiper-bundle.min.js
  copycode:
    enable: true
    default_text: 'Copy'
    success_text: 'Copied'
    toast: 复制成功

######## Style ########
style:
  prefers_theme: auto
  smooth_scroll: true
  font-size:
    root: 16px
    body: 17px
    code: 85%
    codeblock: 0.8125rem
  font-family:
    body: '"Noto Serif SC", "Source Han Serif CN", "Microsoft YaHei", "Segoe UI", Arial, sans-serif'
    code: 'Menlo, Monaco, Consolas, system-ui, monospace, sans-serif'
    codeblock: 'Menlo, Monaco, Consolas, system-ui, monospace, sans-serif'
  text-align: left
  border-radius:
    card-l: 24px
    card: 16px
    card-s: 12px
    bar: 8px
    image-l: 24px
    image: 16px
    image-s: 8px
  color:
    theme: '#2d6cdf'
    accent: '#FA6400'
    link: '#2d6cdf'
  codeblock:
    scrollbar: 4px
    highlightjs_theme: https://gcore.jsdelivr.net/gh/highlightjs/cdn-release@11.9/build/styles/atom-one-dark.min.css
  gradient:
    start: 'linear-gradient(to right, hsl(215, 95%, 64%), hsl(195, 95%, 60%), hsl(165, 95%, 56%), hsl(165, 95%, 56%), hsl(195 95% 60%), hsl(215, 95%, 64%))'
  leftbar:
    background-color: var(--card)
    background-image:
    blur-px: 100px
    blur-bg: var(--bg-a60)
    background-opacity: 0.8
